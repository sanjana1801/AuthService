spring:
  application:
    name: AuthService

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect


jwt:
  secret: mySuperSecretKeyForJwtAuthentication123456789
  expiration: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8082